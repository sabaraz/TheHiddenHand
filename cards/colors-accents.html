<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { width: 90px; }
  .chip { height: 56px; border-radius: var(--hh-radius-md); border: 1px solid var(--hh-line); }
  .name { margin-top: 6px; font-size: 11px; color: var(--hh-muted); font-family: var(--hh-font-mono); }
  .val { font-size: 10px; color: var(--hh-faint); font-family: var(--hh-font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--hh-cream)"></div><div class="name">cream</div><div class="val">#f6da9d</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-gold)"></div><div class="name">gold</div><div class="val">#d2aa5c</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-red)"></div><div class="name">red</div><div class="val">#c0301e</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-blood)"></div><div class="name">blood</div><div class="val">#b85b55</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-green)"></div><div class="name">green</div><div class="val">#71986b</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-blue)"></div><div class="name">blue</div><div class="val">#668aab</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-violet)"></div><div class="name">violet</div><div class="val">#c4aeff</div></div>
  </div>
</body>
</html>
