<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Warm near-black surfaces up to parchment text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { width: 96px; }
  .chip { height: 56px; border-radius: var(--hh-radius-md); border: 1px solid var(--hh-line); }
  .name { margin-top: 6px; font-size: 11px; color: var(--hh-muted); font-family: var(--hh-font-mono); }
  .val { font-size: 10px; color: var(--hh-faint); font-family: var(--hh-font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--hh-bg-deep)"></div><div class="name">bg-deep</div><div class="val">#0a0908</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-bg)"></div><div class="name">bg</div><div class="val">#11100e</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-surface)"></div><div class="name">surface</div><div class="val">#1d1b18</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-surface-2)"></div><div class="name">surface-2</div><div class="val">#28231d</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-line)"></div><div class="name">line</div><div class="val">#4a4035</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-muted)"></div><div class="name">muted</div><div class="val">#b6aa9b</div></div>
    <div class="sw"><div class="chip" style="background:var(--hh-text)"></div><div class="name">text</div><div class="val">#eee7dc</div></div>
  </div>
</body>
</html>
