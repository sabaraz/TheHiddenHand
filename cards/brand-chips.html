<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .csq { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 3px; font-size: 12px; font-weight: 700; letter-spacing: 0.01em; }
  .gain   { background: rgba(113,152,107,0.16); color: var(--hh-green); border: 1px solid rgba(113,152,107,0.28); }
  .cost   { background: rgba(182,170,155,0.08); color: var(--hh-muted); border: 1px solid rgba(182,170,155,0.18); }
  .threat { background: rgba(192,48,30,0.14); color: #e06060; border: 1px solid rgba(192,48,30,0.28); }
  .ritual { background: rgba(167,139,250,0.10); color: var(--hh-violet); border: 1px solid rgba(167,139,250,0.22); }
</style>
</head>
<body>
  <span class="csq gain">+2 Food</span>
  <span class="csq cost">−1 Money</span>
  <span class="csq threat">+1 Suspicion</span>
  <span class="csq ritual">Ritual +1</span>
</body>
</html>
