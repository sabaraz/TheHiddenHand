<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="2px chips → 8px cards → pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 70px; height: 56px; background: var(--hh-surface-2); border: 1px solid var(--hh-line); }
  .lbl { margin-top: 6px; font-family: var(--hh-font-mono); font-size: 10px; color: var(--hh-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl">xs 2</div></div>
    <div class="item"><div class="box" style="border-radius:3px"></div><div class="lbl">sm 3</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="lbl">md 6</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">lg 8</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill</div></div>
  </div>
</body>
</html>
