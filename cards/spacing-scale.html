<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4 → 56px tight table rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { text-align: center; }
  .bar { background: var(--hh-gold); border-radius: 2px; width: 100%; }
  .box { width: 28px; }
  .lbl { margin-top: 6px; font-family: var(--hh-font-mono); font-size: 10px; color: var(--hh-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box"><div class="bar" style="height:4px"></div></div><div class="lbl">1·4</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:8px"></div></div><div class="lbl">3·8</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:12px"></div></div><div class="lbl">4·12</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:16px"></div></div><div class="lbl">6·16</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:20px"></div></div><div class="lbl">7·20</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:28px"></div></div><div class="lbl">8·28</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:40px"></div></div><div class="lbl">9·40</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:56px"></div></div><div class="lbl">10·56</div></div>
  </div>
</body>
</html>
