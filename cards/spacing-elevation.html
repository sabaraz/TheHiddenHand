<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation & Glow" subtitle="Deep table shadows; red glow reserved for threat" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 24px; }
  .row { display: flex; gap: 26px; align-items: center; }
  .item { text-align: center; }
  .box { width: 84px; height: 60px; background: var(--hh-surface-2); border: 1px solid var(--hh-line); border-radius: var(--hh-radius-lg); }
  .lbl { margin-top: 10px; font-family: var(--hh-font-mono); font-size: 10px; color: var(--hh-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--hh-shadow-sm)"></div><div class="lbl">shadow-sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--hh-shadow-md)"></div><div class="lbl">shadow-md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--hh-shadow-lg)"></div><div class="lbl">shadow-lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--hh-shadow-xl)"></div><div class="lbl">shadow-xl</div></div>
    <div class="item"><div class="box" style="border-color:var(--hh-red); box-shadow:var(--hh-glow-alarm-ring)"></div><div class="lbl">glow-alarm</div></div>
  </div>
</body>
</html>
