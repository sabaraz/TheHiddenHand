<!-- @dsCard group="Components" viewport="700x440" name="Game — Event, Choices, Hand, Meters" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; }
  .grid { display: grid; grid-template-columns: 280px 1fr; gap: 24px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 14px; }
  .hand { display: flex; gap: 10px; }
  .lbl { font-size: 11px; font-weight: 720; text-transform: uppercase; letter-spacing: 0.10em; color: var(--hh-muted); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { EventCard, ChoiceCard, ResourceCard, PressureBar, Meter } = window.TheHiddenHandDesignSystem_9a3a95;
    function Demo() {
      return (
        <div className="grid">
          <EventCard
            kind="mandatory"
            title="Empty Shelves"
            body="The cabinets are bare. Those sharing the space look at one another with calculating eyes."
            tags={["food", "apocalyptic"]}
            open
          />
          <div className="col">
            <ChoiceCard
              label="Break open the emergency reserve"
              tone="success"
              gains={[{ kind: "gain", text: "+2 Food" }]}
              costs={[{ kind: "cost", text: "−1 Money" }]}
            />
            <ChoiceCard
              label="Ensure survival at one person's expense"
              tone="danger"
              gains={[{ kind: "gain", text: "+3 Food" }]}
              costs={[{ kind: "cost", text: "−1 Cultists/Prisoners" }, { kind: "threat", text: "+1 Suspicion" }]}
            />
            <PressureBar value={2} max={3} />
            <Meter value={3} max={4} label="Ritual" />
            <span className="lbl">Hand</span>
            <div className="hand">
              <ResourceCard resource="money" />
              <ResourceCard resource="food" />
              <ResourceCard resource="cultists" />
              <ResourceCard resource="suspicion" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
